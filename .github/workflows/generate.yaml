---
name: "Generate Unifi structures"
on:
  # Off-peak minute (not :00) to avoid GitHub's top-of-hour scheduler congestion.
  # Internal generation is capped at 9.5.21 (#129), so that half is an expected
  # no-op; the live-moving part is the Official OpenAPI snapshot.
  schedule:
    - cron: "37 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: "write"
  pull-requests: "write"

jobs:
  fields:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7.0.0

      - uses: "actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c"  # v6.4.0
        with:
          go-version-file: "go.mod"

      # One pass regenerates BOTH surfaces: it refreshes the committed Official
      # OpenAPI snapshot (codegen/openapi/integration-<ver>.json) and the Internal
      # resources, then folds in the Official models + wrappers + interface + mock.
      - name: "Generate new client structures"
        run: 'go generate unifi/codegen.go'

      - name: "Read Unifi version marker"
        id: "unifi_version"
        uses: "juliangruber/read-file-action@271ff311a4947af354c6abcd696a306553b9ec18"  # v1.1.8
        with:
          path: "./.unifi-version"
          trim: "true"

      - name: "Read Official API version marker"
        id: "official_version"
        uses: "juliangruber/read-file-action@271ff311a4947af354c6abcd696a306553b9ec18"  # v1.1.8
        with:
          path: "./.unifi-version-official"
          trim: "true"

      # TODO: Automatically merge the PR if tests pass.
      - uses: "peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1"  # v8.1.1
        with:
          delete-branch: true
          title: "feat: update to the controller version ${{ steps.unifi_version.outputs.content }}"
          commit-message: "feat: update to the controller version ${{ steps.unifi_version.outputs.content }}"
          body: |
            Automated regeneration via `go generate unifi/codegen.go`.

            - Internal resources → controller `${{ steps.unifi_version.outputs.content }}`
            - Official OpenAPI surface (models + wrappers + interface + mock) → spec `${{ steps.official_version.outputs.content }}`

            Review the `codegen/openapi/integration-*.json` diff for the spec delta.
