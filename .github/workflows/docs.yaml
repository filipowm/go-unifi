---
# Builds the Fumadocs documentation site (website/) and deploys it to GitHub
# Pages. Rebuilds whenever the site content changes OR the committed UniFi
# OpenAPI spec changes, so the API reference republishes automatically when a
# new controller spec lands.
name: "Documentation"

on:
  push:
    branches:
      - "main"
    paths:
      - "website/**"
      - "codegen/openapi/**"
      - ".unifi-version-official"
      - ".github/workflows/docs.yaml"
  workflow_dispatch: {}

# Allow only one concurrent deployment; do not cancel an in-progress run so a
# publish always finishes.
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: "read"

jobs:
  build:
    name: "Build"
    runs-on: "ubuntu-latest"
    defaults:
      run:
        working-directory: "website"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7.0.0
        with:
          persist-credentials: false
      - uses: "pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271"  # v4.1.0
        with:
          version: 11
      - uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e"  # v6.0.0
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: "website/pnpm-lock.yaml"
      - name: "Install dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Build static site"
        env:
          # GitHub Pages serves this project site under /go-unifi.
          PAGES_BASE_PATH: "/go-unifi"
        run: |
          pnpm build
          touch out/.nojekyll
      - uses: "actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9"  # v5.0.0
        with:
          path: "website/out"

  deploy:
    name: "Deploy"
    needs: "build"
    runs-on: "ubuntu-latest"
    permissions:
      pages: "write"
      id-token: "write"
    environment:
      name: "github-pages"
      url: "${{ steps.deployment.outputs.page_url }}"
    steps:
      - uses: "actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d"  # v6.0.0
      - id: "deployment"
        uses: "actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128"  # v5.0.0
