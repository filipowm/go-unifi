---
# Builds the Fumadocs documentation site (website/) and deploys it to GitHub
# Pages. Rebuilds whenever the site content changes OR the committed UniFi
# OpenAPI spec changes, so the API reference republishes automatically when a
# new controller spec lands.
name: "Documentation"

on:
  push:
    branches:
      - "main"
    paths:
      - "website/**"
      - "codegen/openapi/**"
      - ".unifi-version-official"
      - ".github/workflows/docs.yaml"
  workflow_dispatch: {}

# Allow only one concurrent deployment; do not cancel an in-progress run so a
# publish always finishes.
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: "read"

jobs:
  build:
    name: "Build"
    runs-on: "ubuntu-latest"
    defaults:
      run:
        working-directory: "website"
    steps:
      - uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10"  # v6.0.3
      - uses: "pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1"  # v4.1.0
        with:
          version: 11
      - uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e"  # v6.0.0
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: "website/pnpm-lock.yaml"
      - name: "Install dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Build static site"
        env:
          # GitHub Pages serves this project site under /go-unifi.
          PAGES_BASE_PATH: "/go-unifi"
        run: |
          pnpm build
          touch out/.nojekyll
      - uses: "actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa"  # v3.0.1
        with:
          path: "website/out"

  deploy:
    name: "Deploy"
    needs: "build"
    runs-on: "ubuntu-latest"
    permissions:
      pages: "write"
      id-token: "write"
    environment:
      name: "github-pages"
      url: "${{ steps.deployment.outputs.page_url }}"
    steps:
      - uses: "actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b"  # v5.0.0
      - id: "deployment"
        uses: "actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e"  # v4.0.5
