---
customizations:
  client:
    imports: ["io"]
    # excludeResources omits a resource from the Client interface only; its
    # generated types + private CRUD still ship for a hand-written wrapper.
    #   DescribedFeature  -> list-only wrapper in described_feature.go
    #   FirewallZoneMatrix -> list-only wrapper in firewall_zone_matrix.go
    excludeResources: ["DescribedFeature", "FirewallZoneMatrix"]
    # excludeGeneration skips a resource entirely (no .generated.go at all).
    #   Dpi* (DpiApp/DpiGroup) -> unsupported, no wrapper; would be dead code.
    excludeGeneration: ["Dpi*"]
    functions:
      - name: "BaseURL"
        comment: "BaseURL returns the base URL of the controller."
        returns:
          - "string"
      - name: "Version"
        comment: "Version returns the version of the UniFi Controller API."
        returns:
          - "string"
      - name: "VersionContext"
        comment: "VersionContext returns the version of the UniFi Controller API using the supplied context, surfacing any fetch error instead of swallowing it."
        params:
          - name: "ctx"
            type: "context.Context"
        returns:
          - "string"
          - "error"
      - name: "Do"
        comment: "Do sends a request to the controller."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "method"
            type: "string"
          - name: "apiPath"
            type: "string"
          - name: "reqBody"
            type: "any"
          - name: "respBody"
            type: "any"
        returns:
          - "error"
      - name: "Get"
        comment: "Get sends a GET request to the controller."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "apiPath"
            type: "string"
          - name: "reqBody"
            type: "any"
          - name: "respBody"
            type: "any"
        returns:
          - "error"
      - name: "Post"
        comment: "Post sends a POST request to the controller."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "apiPath"
            type: "string"
          - name: "reqBody"
            type: "any"
          - name: "respBody"
            type: "any"
        returns:
          - "error"
      - name: "Put"
        comment: "Put sends a PUT request to the controller."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "apiPath"
            type: "string"
          - name: "reqBody"
            type: "any"
          - name: "respBody"
            type: "any"
        returns:
          - "error"
      - name: "Delete"
        comment: "Delete sends a DELETE request to the controller."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "apiPath"
            type: "string"
          - name: "reqBody"
            type: "any"
          - name: "respBody"
            type: "any"
        returns:
          - "error"


      - name: "AdoptDevice"
        comment: "AdoptDevice adopts a device by MAC address."
        resourceName: "Device"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "mac"
            type: "string"
        returns:
          - "error"
      - name: "ForgetDevice"
        comment: "ForgetDevice forgets a device by MAC address."
        resourceName: "Device"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "mac"
            type: "string"
        returns:
          - "error"
      - name: "GetDeviceByMAC"
        resourceName: "Device"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "mac"
            type: "string"
        returns:
          - "*Device"
          - "error"
      - name: "ReorderFirewallRules"
        resourceName: "FirewallRule"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "ruleset"
            type: "string"
          - name: "reorder"
            type: "[]FirewallRuleIndexUpdate"
        returns:
          - "error"
      - name: "ReorderFirewallPolicies"
        resourceName: "FirewallZonePolicy"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "d"
            type: "*FirewallPolicyOrderUpdate"
        returns:
          - "[]FirewallZonePolicy"
          - "error"
      - name: "GetSetting"
        resourceName: "Setting"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "key"
            type: "string"
        returns:
          - "*Setting"
          - "any"
          - "error"
      - name: "SetSetting"
        resourceName: "Setting"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "key"
            type: "string"
          - name: "reqBody"
            type: "any"
        returns:
          - "any"
          - "error"
      - name: "ListSites"
        resourceName: "Site"
        params:
          - name: "ctx"
            type: "context.Context"
        returns:
          - "[]Site"
          - "error"
      - name: "GetSite"
        resourceName: "Site"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "id"
            type: "string"
        returns:
          - "*Site"
          - "error"
      - name: "CreateSite"
        resourceName: "Site"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "description"
            type: "string"
        returns:
          - "[]Site"
          - "error"
      - name: "DeleteSite"
        resourceName: "Site"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "id"
            type: "string"
        returns:
          - "[]Site"
          - "error"
      - name: "UpdateSite"
        resourceName: "Site"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "name"
            type: "string"
          - name: "description"
            type: "string"
        returns:
          - "[]Site"
          - "error"
      - name: "GetSystemInfo"
        resourceName: "SysInfo"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "id"
            type: "string"
        returns:
          - "*SysInfo"
          - "error"
      - name: "GetSystemInformation"
        resourceName: "SysInfo"
        returns:
          - "*SysInfo"
          - "error"
      - name: "GetSystemInformationContext"
        resourceName: "SysInfo"
        comment: "GetSystemInformationContext retrieves system information using the supplied context for cancellation/deadline."
        params:
          - name: "ctx"
            type: "context.Context"
        returns:
          - "*SysInfo"
          - "error"
      - name: "GetUserByMAC"
        resourceName: "User"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "mac"
            type: "string"
        returns:
          - "*User"
          - "error"
      - name: "BlockUserByMAC"
        resourceName: "User"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "mac"
            type: "string"
        returns:
          - "error"
      - name: "UnblockUserByMAC"
        resourceName: "User"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "mac"
            type: "string"
        returns:
          - "error"
      - name: "DeleteUserByMAC"
        resourceName: "User"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "mac"
            type: "string"
        returns:
          - "error"
      - name: "KickUserByMAC"
        resourceName: "User"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "mac"
            type: "string"
        returns:
          - "error"
      - name: "OverrideUserFingerprint"
        resourceName: "User"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "mac"
            type: "string"
          - name: "devIdOverride"
            type: "int"
        returns:
          - "error"
      - name: "GetTrafficFlows"
        resourceName: "TrafficFlow"
        comment: "GetTrafficFlows fetches traffic flows using the provided request payload."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "req"
            type: "*TrafficFlowsRequest"
        returns:
          - "*TrafficFlowsResponse"
          - "error"
      - name: "ListFirewallZoneMatrix"
        resourceName: "FirewallZoneMatrix"
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
        returns:
          - "[]FirewallZoneMatrix"
          - "error"
      - name: "ListFeatures"
        resourceName: "DescribedFeature"
        comment: "ListFeatures returns all features of the UniFi controller."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
        returns:
          - "[]DescribedFeature"
          - "error"
      - name: "GetFeature"
        resourceName: "DescribedFeature"
        comment: "GetFeature returns a specific feature by it's name. Name is case-insensitive."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "name"
            type: "string"
        returns:
          - "*DescribedFeature"
          - "error"
      - name: "IsFeatureEnabled"
        resourceName: "DescribedFeature"
        comment: "IsFeatureEnabled returns if a specific feature is enabled by it's name. Name is case-insensitive."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "name"
            type: "string"
        returns:
          - "bool"
          - "error"
      - name: "UploadPortalFile"
        resourceName: "PortalFile"
        comment: "UploadPortalFile uploads a Hotspot Portal file to the controller."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "filepath"
            type: "string"
        returns:
          - "*PortalFile"
          - "error"
      - name: "UploadPortalFileFromReader"
        resourceName: "PortalFile"
        comment: "UploadPortalFileFromReader uploads a Hotspot Portal file using io.Reader to the controller."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "reader"
            type: "io.Reader"
          - name: "filename"
            type: "string"
        returns:
          - "*PortalFile"
          - "error"
      - name: "DeletePortalFile"
        resourceName: "PortalFile"
        comment: "DeletePortalFile deletes a Hotspot Portal file from the controller."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "id"
            type: "string"
        returns:
          - "error"
      - name: "ListPortalFiles"
        resourceName: "PortalFile"
        comment: "ListPortalFiles lists all Hotspot Portal files on the controller."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
        returns:
          - "[]PortalFile"
          - "error"
      - name: "GetPortalFile"
        resourceName: "PortalFile"
        comment: "GetPortalFile returns a specific Hotspot Portal file by it's ID."
        params:
          - name: "ctx"
            type: "context.Context"
          - name: "site"
            type: "string"
          - name: "id"
            type: "string"
        returns:
          - "*PortalFile"
          - "error"
  resources:
    Account:
      fields:
        IP:
          omitEmpty: true
        NetworkID:
          omitEmpty: true
    APGroup:
      resourcePath: "apgroups"
    ChannelPlan:
      fields:
        Channel:
          ifFieldType: "string"
          customUnmarshalType: "numberOrString"
        BackupChannel:
          ifFieldType: "string"
          customUnmarshalType: "numberOrString"
        TxPower:
          ifFieldType: "string"
          customUnmarshalType: "numberOrString"
    ContentFiltering:
      resourcePath: "content-filtering"
      excludeFunctions: ["Get"]
      fields:
        AllowList:
          omitEmpty: false
        BlockList:
          omitEmpty: false
        Categories:
          omitEmpty: false
        Date:
          fieldType: "string"
          customUnmarshalType: ""
        DateStart:
          fieldType: "string"
          customUnmarshalType: ""
        DateEnd:
          fieldType: "string"
          customUnmarshalType: ""
    DNSRecord:
      resourcePath: "static-dns"
    DescribedFeature:
      resourcePath: "described-features"
      # First-class query params (ARCH-19): rendered after the id segment on
      # id-suffixed URLs so the id never lands behind the query string.
      queryParams:
        includeSystemFeatures: "true"
    Device:
      fields:
        _all:
          omitEmpty: true
        X:
          fieldType: "float64"
        Y:
          fieldType: "float64"
        StpPriority:
          fieldType: "string"
          customUnmarshalType: "numberOrString"
        Ht:
          fieldType: "int"
        Channel:
          customUnmarshalType: "numberOrString"
          ifFieldType: "string"
        BackupChannel:
          customUnmarshalType: "numberOrString"
          ifFieldType: "string"
        TxPower:
          customUnmarshalType: "numberOrString"
          ifFieldType: "string"
        LteExtAnt:
          customUnmarshalType: "booleanishString"
        LtePoe:
          customUnmarshalType: "booleanishString"
        PortOverrides:
          omitEmpty: false
    FirewallZone:
      resourcePath: "firewall/zone"
      fields:
        NetworkIDs:
          omitEmpty: false
    FirewallZoneMatrix:
      resourcePath: "firewall/zone-matrix"
    FirewallZonePolicy:
      resourcePath: "firewall-policies"
      fields:
        IPGroupID:
          omitEmpty: true
        PortGroupID:
          omitEmpty: true
        Date:
          fieldType: "string"
          customUnmarshalType: ""
        DateStart:
          fieldType: "string"
          customUnmarshalType: ""
        DateEnd:
          fieldType: "string"
          customUnmarshalType: ""
    Network:
      fields:
        FirewallZoneID:
          omitEmpty: true
        InternetAccessEnabled:
          ifFieldType: "bool"
          customUnmarshalType: "*bool"
          customUnmarshalFunc: "emptyBoolToTrue"
        IntraNetworkAccessEnabled:
          ifFieldType: "bool"
          customUnmarshalType: "*bool"
          customUnmarshalFunc: "emptyBoolToTrue"
        IPSecEspLifetime:
          fieldType: "int"
        IPSecIkeLifetime:
          fieldType: "int"
        WANUsername:
          omitEmpty: true
        XWANPassword:
          omitEmpty: true
    SettingGuestAccess:
      fields:
        AllowedSubnet:
          jsonPath: "allowed_subnet"
        PortalCustomizedBgImageFilename:
          omitEmpty: false
        PortalCustomizedLogoFilename:
          omitEmpty: false
        RestrictedSubnet:
          jsonPath: "restricted_subnet"
        GoogleDomain:
          omitEmpty: false
        Expire:
          fieldType: "int"
          customUnmarshalType: "emptyStringInt"
        RestrictedDNSServers:
          omitEmpty: false
    SettingIps:
      fields:
        Honeypot:
          omitEmpty: false
    SettingMgmt:
      fields:
        AutoUpgradeHour:
          omitEmpty: false
        XSshKeys:
          omitEmpty: false
    SettingRsyslogd:
      fields:
        Contents:
          omitEmpty: false
        IP:
          omitEmpty: false
        NetconsoleHost:
          omitEmpty: false
    SettingUsg:
      fields:
        GeoIPFilteringCountries:
          omitEmpty: false
    User:
      fields:
        Blocked:
          fieldType: "bool"
        LastSeen:
          fieldType: "int"
          customUnmarshalType: "emptyStringInt"
    WLAN:
      fields:
        ScheduleWithDuration:
          omitEmpty: false
        DPIgroupID:
          omitEmpty: true
        RADIUSProfileID:
          omitEmpty: true
    PortProfile:
      fields:
        NATiveNetworkID:
          omitEmpty: true
        VoiceNetworkID:
          omitEmpty: true
    FirewallRule:
      fields:
        DstNetworkID:
          omitEmpty: true
        SrcNetworkID:
          omitEmpty: true
        ICMPTypename:
          omitEmpty: true
        ICMPv6Typename:
          omitEmpty: true
        IPSec:
          omitEmpty: true
        ProtocolV6:
          omitEmpty: true
        SrcMACAddress:
          omitEmpty: true
    FirewallGroup:
      fields:
        # GroupMembers is a slice that defaults to empty when no members are
        # configured. With omitempty (the default behavior for slices), an
        # empty slice gets entirely omitted from the JSON payload, and UniFi
        # creates the resource without the field. The Network app's Settings
        # page then chokes on `undefined.length` when iterating members.
        # Force the field to always be sent — empty slice serializes to `[]`
        # which the UI handles correctly.
        GroupMembers:
          omitEmpty: false
