---
version: "2"

linters:
  default: 'all'
  disable:
    # Opinionated / intentionally disabled
    - 'depguard'
    - 'ireturn'
    - 'mnd'
    - 'nlreturn'
    - 'tagliatelle'
    # Whitespace/cuddle linter. v1 'wsl' was disabled; v2 ships it as two
    # separate linters (wsl + wsl_v5), both enabled by `default: all`.
    - 'wsl'
    - 'wsl_v5'
    # Deprecated: superseded by gomodguard_v2 (which stays enabled via default: all).
    - 'gomodguard'

    # Temporary — re-enable as the codebase is cleaned up
    - 'dupl'
    - 'err113'
    - 'exhaustruct'
    - 'forbidigo'
    - 'funlen'
    - 'gochecknoglobals'
    - 'goconst'
    - 'gocritic'
    - 'godox'
    - 'lll'
    - 'maintidx'
    - 'noinlineerr'
    - 'paralleltest'
    - 'revive'
    - 'varnamelen'
    - 'wrapcheck'

  settings:
    tagalign:
      # Generated structs carry very long `validate` tags (some 200+ chars), so
      # column-aligning them produces unreadable padding. Keep tag order stable,
      # skip alignment.
      align: false
      sort: true

  exclusions:
    # Lint generated code too — the generator is responsible for emitting
    # lint-clean output (see codegen/). Only a few categories are inherent to
    # the generated code and are excluded below.
    generated: 'disable'
    presets:
      - 'comments'
      - 'common-false-positives'
      - 'legacy'
      - 'std-error-handling'
    rules:
      # Generated code: issues inherent to the UniFi API / generator design and
      # not fixable without breaking the API mapping.
      - path: '\.generated\.go'
        linters:
          - 'misspell'        # field names mirror UniFi's JSON keys (e.g. IGMPSupression, dynamicdns)
          - 'modernize'
          - 'interfacebloat'  # the aggregate Client interface exposes many methods by design
          - 'unused'          # generated helpers/types not referenced within this module
          - 'containedctx'    # moq's client_mock.generated.go records calls in structs that hold the ctx arg
      # Official OpenAPI models are emitted by the third-party oapi-codegen
      # (via codegen/official): its union/discriminator output is inherently
      # high-complexity and uses mixed receivers / spec-derived comments that
      # can't be made lint-clean without editing DO-NOT-EDIT code. Correctness
      # linters (govet, staticcheck, ...) still apply.
      - path: 'official/models\.generated\.go'
        linters:
          - 'cyclop'
          - 'dupword'
          - 'gocognit'
          - 'gocyclo'
          - 'godoclint'
          - 'godot'
          - 'iface'
          - 'recvcheck'
      - path: 'client.generated.go'
        linters:
          - 'gofumpt'         # strict linting not needed
      - path: 'client_mock.generated.go'
        linters:
          - 'gofumpt'         # moq emits gofmt (not gofumpt) formatting; it is generated, DO NOT EDIT
    paths:
      - 'third_party$'
      - 'builtin$'
      - 'examples$'

formatters:
  enable:
    - 'gofumpt'
    - 'goimports'
  exclusions:
    generated: 'disable'
    paths:
      - 'third_party$'
      - 'builtin$'
      - 'examples$'
      # moq emits gofmt-formatted output, not gofumpt; it is generated and
      # carries a DO NOT EDIT banner, so do not hold it to the formatter.
      - 'client_mock\.generated\.go'
